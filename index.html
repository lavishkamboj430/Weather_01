<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link rel="stylesheet" href="weather.css">
</head>

<body>
    <div class="outer">
        <div class="Nav flex">
            <div class="input_logo flex">
               <button class="Location_image"><img src="location.png" alt="" ></button>
                <div class="location">Haryana</Div>
            </div>
            <button class="btn"><sup>o</sup>C/<sup>o</sup>F </button>
        </div>
        <div class="show_temp flex">
            <div class="temp">20<sup>o</sup>C</div>
            <div class="weather">cloudy</div>
        </div>
        <div class="info flex">
            <div class="data">
                <div class="title">Humidity</div>
                <div class="value">55%</div>
            </div>
            <div class="data">
                <div class="title">Wind</div>
                <div class="value">15km/h</div>
            </div>
            <div class="data">
                <div class="title">Time</div>
                <div class="value">19:20Am</div>
            </div>
        </div>
    </div>
    <script src="weather.js"></script>
</body>

</html>
